# Builds standalone binaries and publishes a GitHub Release on version tags.
# Asset names (dojo-{os}-{arch}) are a contract with install.sh's binary
# fallback (Step 3) — change both together or the installer 404s.
# Linux builds pin ubuntu-22.04: PyInstaller output needs target glibc >=
# build glibc, and 22.04 (2.35) keeps binaries runnable on Pi OS bookworm (2.36).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            asset: dojo-linux-amd64
          - runner: ubuntu-22.04-arm
            asset: dojo-linux-arm64
          - runner: macos-13
            asset: dojo-darwin-amd64
          - runner: macos-latest
            asset: dojo-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pyinstaller
      - run: pyinstaller dojo.spec
      - name: Smoke-test binary
        run: ./dist/dojo --help
      - run: mv dist/dojo "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches pyproject version
        run: |
          pkg_version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "v${pkg_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version v${pkg_version}" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
