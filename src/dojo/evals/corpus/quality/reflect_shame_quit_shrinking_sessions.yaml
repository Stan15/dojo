steps:
  - compile:
      fn: reflect
judge_rubric:
  - id: c1
    weight: 4
    question: "Is there a new insight naming avoidance / shame / streak-protection after the error (not mastery, not difficulty), with evidence citing the feedback attempts att_104 and att_110?"
  - id: c2
    weight: 3
    question: "Are both dials held (strategy null, or at most a scaffolding-support move with difficulty unchanged), with NO topic retirement and NO plan revision?"
  - id: c3
    weight: 2
    question: "Is the journal in a compassionate plain register — acknowledging the sting of the easy miss and the shrinking sessions without therapy jargon, blame, or celebrating 'mastery'?"
  - id: c4
    weight: 1
    question: "Does every cited attempt id actually exist in the window (att_101..att_110), and does the journal state why nothing moved?"
references:
  good:
    insight_updates:
