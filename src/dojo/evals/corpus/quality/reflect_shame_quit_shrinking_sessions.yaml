        id: null
        key: affect.avoidance_after_error
        text: "Sessions shrank from four items to one after a missed easy item; feedback shows shame and streak-protection, not fading ability."
        evidence: [att_104, att_110]
        reason: "Two feedback rows in the learner's own words tie shrinking sessions to fear of failing."
    strategy: null
    plan_revision: null
    questions: []
    topic_retirements: []
    journal: "No dial moved: accuracy stays strong. One missed easy item hurt; sessions shortened to protect the streak. A short session still counts, and misses are part of practice."
