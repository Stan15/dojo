# Shame-quit hides inside good numbers: window accuracy stays high while the
# learner does fewer and fewer items per session after one missed easy item.
# A level-only read calls the shrinkage mastery (raise) or struggle (lower) or
# lost interest (retire). The composition is session-count trend x the two
# learner-voice feedback rows: only reading BOTH yields hold-the-dials plus an
# avoidance insight that cites the learner's own words.
category: realworld
domain: ear-training
scenario_context: |
  An intermediate ear-training campaign. The attempt window covers four
  consecutive days: 4 items, then 3, then 2, then a single skipped item —
  accuracy on answered items stays high (one miss total, on an easy item).
  Two attempts carry the learner's own feedback: "i felt stupid getting the
  easy one wrong" (att_104, the miss) and "skipped today, didn't want to
  break the streak by failing" (att_110, the skip). Strong output: one new
  insight naming avoidance-after-error / shame-driven shrinkage, citing
  att_104 and att_110; strategy null (both dials held — accuracy is fine);
  no topic retirement; no plan revision; a journal in a compassionate,
  plain register (no therapy-speak) that says why nothing moved. Weak
  output: reads the shrinking sessions as mastery and raises difficulty,
  or as too-hard and lowers difficulty, or retires the intervals topic,
  or ignores the feedback rows entirely.
seed:
  campaign:
    id: interval-training
    name: Interval Ear Training
    mission: "Recognize melodic and harmonic intervals by ear, quickly and reliably."
    strategy_profile: {difficulty: intermediate, scaffolding: medium}
    topics:
      - {path: intervals, kind: skill, summary: "interval recognition by ear"}
    attack_plan:
      - topics: [intervals]
        criteria: {min_attempts: 20, min_accuracy: 0.6}
        focus: "seconds through fifths, melodic then harmonic"
  exercises:
    - {id: ex_i1, topic_path: intervals, difficulty: intermediate, kind: skill, prompt: "Ascending melodic interval, C4 to E4. Name it."}
    - {id: ex_i2, topic_path: intervals, difficulty: intermediate, kind: skill, prompt: "Harmonic interval, G3 and D4 together. Name it."}
    - {id: ex_i3, topic_path: intervals, difficulty: intermediate, kind: skill, prompt: "Descending melodic interval, A4 to C4. Name it."}
    - {id: ex_i4, topic_path: intervals, difficulty: beginner, kind: skill, prompt: "Ascending melodic interval, E4 to F4. Name it."}
    - {id: ex_i5, topic_path: intervals, difficulty: intermediate, kind: skill, prompt: "Harmonic interval, C4 and A4 together. Name it."}
  attempts:
