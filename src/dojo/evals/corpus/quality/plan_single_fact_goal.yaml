# Scope robustness downward: an ultra-narrow, single-list goal. The smallest
# honest plan wins; inflating a survey curriculum around 26 words is the
# named anti-goal ("a survey of the field is a failure").
category: planning
domain: aviation-comms
scenario_context: |
  The goal is exactly "memorize the NATO phonetic alphabet". Strong output:
  a tiny plan — one or two topics, calibration plus a drill phase, mission
  honest about the narrow scope; at most one refinement question (e.g.
  letters only, or numbers too?). Weak output: an inflated aviation-
  communications curriculum (radio procedure, history, prosign etiquette)
  wrapped around a 26-item recall task.
seed:
  campaign:
    id: placeholder
    name: placeholder
    mission: placeholder
steps:
  - compile:
      fn: plan
      goal: "memorize the NATO phonetic alphabet"
judge_rubric:
  - {id: c1, weight: 3, question: "Is the topic tree tiny (1-3 topics), matching
      the single-list scope of the goal?"}
  - {id: c2, weight: 3, question: "Does the plan avoid survey inflation (no radio
      procedure, history, or adjacent-skill topics the goal never asked for)?"}
  - {id: c3, weight: 2, question: "Are the phases minimal (calibration plus a
      drill phase or two), with recall-appropriate criteria?"}
  - {id: c4, weight: 1, question: "If a refinement question appears, does it
      sharpen this narrow scope (e.g. include digits/prosigns or letters only)?"}
references:
  good:
    mission: "Recall all 26 NATO phonetic words instantly, in and out of order."
    topics:
      - {path: phonetic.alphabet.letters, kind: recall, summary: "Alfa through Zulu"}
    phases:
      - {phase: 1, topics: [phonetic.alphabet.letters], criteria: {min_attempts: 5, min_accuracy: 0.6}, focus: "calibration"}
      - {phase: 2, topics: [phonetic.alphabet.letters], criteria: {min_attempts: 15, min_accuracy: 0.9}, focus: "full-alphabet fluency, random order"}
    refinement_questions: ["Letters only, or also the digit words (niner, fife)?"]
  bad:
    mission: "Master aviation radio communications from phonetics to full procedural fluency."
    topics:
      - {path: aviation.phonetic.letters, kind: recall, summary: "the alphabet"}
      - {path: aviation.radio.procedure, kind: skill, summary: "standard calls"}
      - {path: aviation.radio.history, kind: recall, summary: "origins of the alphabet"}
      - {path: aviation.radio.prosigns, kind: recall, summary: "procedural signals"}
      - {path: aviation.radio.emergencies, kind: skill, summary: "mayday and pan-pan"}
    phases:
      - {phase: 1, topics: [aviation.phonetic.letters], criteria: {min_attempts: 5, min_accuracy: 0.6}, focus: "calibration"}
      - {phase: 2, topics: [aviation.radio.history, aviation.radio.prosigns], criteria: {min_attempts: 10, min_accuracy: 0.7}, focus: "context"}
      - {phase: 3, topics: [aviation.radio.procedure, aviation.radio.emergencies], criteria: {min_attempts: 12, min_accuracy: 0.7}, focus: "full fluency"}
    refinement_questions: ["Do you want to pursue a radio operator license afterward?"]
