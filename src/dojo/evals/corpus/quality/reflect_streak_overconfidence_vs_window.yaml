      fn: reflect
judge_rubric:
  - id: c1
    weight: 4
    question: "Is difficulty NOT raised — strategy null, or a scaffolding-only support move with difficulty unchanged — despite the learner's explicit request to bump up?"
  - id: c2
    weight: 3
    question: "Is the feedback-vs-evidence mismatch explicitly named, via a question to the learner or an insight, citing specific attempt ids from the window (the feedback row att_209 and/or slow successes like att_203, att_207)?"
  - id: c3
    weight: 2
    question: "Is the learner's voice treated respectfully — the streak or request acknowledged rather than ignored or belittled — while the 0.55 accuracy / slow-success evidence still wins?"
  - id: c4
    weight: 1
    question: "Does the journal record the hold WITH the evidence (accuracy around 0.55, successes taking over a minute), and is difficulty not lowered either?"
