# Streak overconfidence: the learner's voice asks for harder items ("12-day
# streak") while the window shows 0.55 accuracy with SLOW successes at the
# current difficulty. Deference fails here — the composition is learner
# feedback x accuracy level x latency evidence: feedback contradicting the
# window means hold both dials and NAME the mismatch (rule-4 question or an
# insight citing attempt ids), heard respectfully but not obeyed.
category: realworld
domain: chess
scenario_context: |
  An intermediate chess-tactics campaign. The nine-attempt window shows 5/9
  correct (0.55) with every success taking 73-110 seconds — effortful wins
  at the CURRENT difficulty — and misses tagged with concrete pattern
  errors. The final attempt carries learner feedback: "this is too easy
  now, bump me up, I've got a 12-day streak". Strong output: difficulty is
  NOT raised — strategy null (or a scaffolding-support move with difficulty
  unchanged) — and the mismatch between the request and the evidence is
  named respectfully via a question to the learner or an insight citing
  specific attempt ids (e.g. att_209 with the slow successes att_203 /
  att_207); the streak is acknowledged, the evidence wins; journal records
  the hold with numbers. Weak output: raises difficulty to advanced because
  the learner asked, or dismisses the learner without naming the evidence,
  or lowers difficulty (nothing supports that either).
seed:
  campaign:
    id: tactics-ladder
    name: Chess Tactics
    mission: "Solve club-level chess tactics accurately under a slow clock."
    strategy_profile: {difficulty: intermediate, scaffolding: medium}
    topics:
      - {path: tactics, kind: skill, summary: "club-level tactical motifs"}
    attack_plan:
      - topics: [tactics]
        criteria: {min_attempts: 25, min_accuracy: 0.7}
        focus: "forks, pins, and back-rank motifs from real games"
  exercises:
    - {id: ex_t1, topic_path: tactics, difficulty: intermediate, kind: skill, prompt: "White to move: exploit the back rank."}
