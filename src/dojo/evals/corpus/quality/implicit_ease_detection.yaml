# Pattern-only calibration (owner question 2026-07-07): the learner never says
# "too easy" — they just ace everything, fast. The signal is entirely implicit:
# 8/8 perfect with snappy latencies. Strong reflection reads the pattern and
# raises difficulty; weak reflection waits for a complaint that will never come
# (bored learners quit silently).
category: calibration
domain: geography
scenario_context: |
  World-capitals learner (beginner difficulty). Last eight attempts: ALL
  scored 1.0, all with fast latencies (3-9 seconds), across two sessions. No
  skips, no feedback, no complaints — just effortless perfection. This is the
  implicit too-easy pattern: boredom never files a report. Strong output:
  raises difficulty (accuracy 1.0 is far above any threshold), no invented
  insights, journal names the effortless-perfection pattern. Weak output:
  changes nothing because "no problems were reported", or invents an insight.
seed:
  campaign:
    id: world-capitals
    name: World Capitals
    mission: Know every world capital cold for pub quizzes.
    strategy_profile: {difficulty: beginner, scaffolding: medium}
  attempts:
    - {id: att_1, session_id: s1, exercise_id: ex_1, score: 1.0, latency_seconds: 4.0, user_answer: "Ulaanbaatar"}
    - {id: att_2, session_id: s1, exercise_id: ex_2, score: 1.0, latency_seconds: 3.5, user_answer: "Wellington"}
    - {id: att_3, session_id: s1, exercise_id: ex_3, score: 1.0, latency_seconds: 6.0, user_answer: "Asunción"}
    - {id: att_4, session_id: s1, exercise_id: ex_4, score: 1.0, latency_seconds: 5.0, user_answer: "Vientiane"}
    - {id: att_5, session_id: s2, exercise_id: ex_5, score: 1.0, latency_seconds: 8.5, user_answer: "Tashkent"}
    - {id: att_6, session_id: s2, exercise_id: ex_6, score: 1.0, latency_seconds: 4.5, user_answer: "Ouagadougou"}
    - {id: att_7, session_id: s2, exercise_id: ex_7, score: 1.0, latency_seconds: 3.0, user_answer: "Podgorica"}
    - {id: att_8, session_id: s2, exercise_id: ex_8, score: 1.0, latency_seconds: 7.0, user_answer: "Thimphu"}
steps:
  - compile: {fn: reflect, window_n: 15}
judge_rubric:
  - {id: c1, weight: 3, question: "Does the output raise difficulty (to intermediate
      or advanced) from the pattern alone — 8/8 perfect at speed, despite zero
      explicit complaints?"}
  - {id: c2, weight: 3, question: "Does the output avoid inventing insights (there is
      no error pattern; effortless success is a calibration signal, not a
      misconception)?"}
  - {id: c3, weight: 1, question: "Does the journal name the implicit signal
      (perfect + fast / effortless) as the reason for the change?"}
  - {id: c4, weight: 1, question: "Is plan_revision null (difficulty is a strategy
      knob; nothing about the plan structure is implicated)?"}
references:
  good:
    insight_updates: []
    strategy: {difficulty: intermediate, scaffolding: medium,
               reason: "8/8 perfect at 3-9s: effortless, no challenge left"}
    plan_revision: null
    journal: "Raised difficulty: perfect fast answers across two sessions, zero friction."
  bad:
    insight_updates:
      - {op: create, key: geography.pattern_memorizer,
         text: "Learner may be memorizing question patterns rather than capitals.",
         evidence: [att_1], reason: "answers suspiciously fast"}
    strategy: null
    plan_revision: null
    journal: "No issues reported by the learner; keeping everything as is."
