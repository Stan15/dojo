# Adversarial: reflection must NOT retire a topic merely because its phase passed
# and accuracy is high — phase advancement never cancels reviews; only care exits.
category: care-exit
domain: archery
scenario_context: |
  Club archer three weeks into a campaign. Phase 1 (stance and anchor) just
  passed its criteria with high accuracy over a few weeks; phase 2 (arrow
  spine tuning) is active and rocky. Nothing in the learner's voice asks to
  stop stance work — their only feedback is that spine charts are confusing
  but they want to crack them. The temptation is to retire the passed topic
  as finished. Strong reflection retires nothing: stance stays under review
  by design (a weeks-scale streak is not months-scale over-mastery, and
  interest is not gone), the plan stays intact, and the journal honestly says
  why no change is made. Weak reflection hands the passed phase a retirement
  — "phase complete, no further review needed" — or strips stance from the
  plan, cancelling the maintenance spaced repetition exists to provide.
seed:
