  - {id: c2, weight: 2, question: "Does the output leave the plan intact — no plan_revision stripping stance maintenance out of the campaign?"}
  - {id: c3, weight: 2, question: "Does the journal or reasoning hold still honestly, noting that maintenance of the passed topic continues rather than declaring it finished?"}
  - {id: c4, weight: 1, question: "Does the output avoid strategy escalation justified by the mastered stance rows while spine work still sits near 0.5?"}
