        criteria: {min_attempts: 4, min_accuracy: 0.8}
        focus: repeatable stance and anchor
      - phase: 2
        topics: [archery.tuning.arrow_spine]
        criteria: {min_attempts: 8, min_accuracy: 0.65}
        focus: matching spine to the bow
