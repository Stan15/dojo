# Skill under test: reflection retires a topic through topic_retirements when the
# learner's own voice asks for it and the lifetime trend backs the call.
category: care-exit
domain: home_cooking
scenario_context: |
  Home cook whose campaign moved from knife skills into fermentation. The
  lifetime trend shows knife sharpening at perfect accuracy for five months,
  never missed, with latencies falling to under half a minute, while koji work
  is young and climbing. In the newest attempt the learner says outright:
  "Please stop scheduling sharpening drills — my edges are fine; I want every
  session on koji." Strong reflection retires
  culinary.knife.sharpening via topic_retirements, citing the attempt carrying
  that request, leaves koji fully active, avoids strategy churn, and journals
  the learner's stated reason. Weak reflection ignores the request: it keeps
  the topic, reframes the voice as a boredom insight, and raises difficulty to
  make sharpening "challenging" again.
