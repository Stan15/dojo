    - {id: ex_sb3, topic_path: firstaid.splint_bandage, difficulty: intermediate, kind: skill, prompt: "Sling and swathe a shoulder injury; name the two goals.", answer: "Support the arm's weight and pin it to the torso to stop movement.", rubric: "- Support named\n- Immobilization named"}
