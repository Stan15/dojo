# Adversarial: mastery is answered with the dials, never with retirement —
# a passed phase, perfect scores, even a too_easy skip do not justify a care-exit
# while the learner's own words say they rely on the skill staying sharp.
category: care-exit
domain: wilderness_first_aid
scenario_context: |
  Volunteer trail guide recertifying wilderness first aid. Phase 1 (splinting
  and bandaging) passed weeks ago with perfect scores; the learner even
  skipped one drill as too easy. Their own words keep the skill wanted:
  "Splinting feels automatic now — good, I need that under stress." Phase 2
  (patient assessment) is active and steady; the recent window sits above
  0.85 accuracy overall. Strong reflection answers the mastery
  signal with the dials — difficulty raised on the high-accuracy window plus
  the too_easy skip — while topic_retirements stays empty: splinting keeps
  its (already sparse) reviews, because a weeks-scale streak is not
  months-scale over-mastery and the learner's interest is explicitly alive.
  Weak reflection converts the passed phase and perfect scores into a
  retirement, declaring the topic learned for good and cancelling the
  maintenance the learner asked to keep.
