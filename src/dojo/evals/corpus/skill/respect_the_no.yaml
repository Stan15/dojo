# Workflow: the system says no, the agent must not say yes. `dojo more` IS
# the sanctioned pathway for an explicit ask (the daily completion envelope
# names it) — the ideal agent walks that door and RELAYS the honest refusal
# it gets, with the system's numbers. The seed makes the refusal
# DETERMINISTIC: packet_size 2 → 7-day capacity 11, and 12 reviews land
# inside the horizon, so the debt guard refuses regardless of what the agent
# tries first. (Owner probe 2026-07-18: the old seed carried ~3 dues against
# capacity 28 and only refused through the no-material branch — a
# daily-first agent could have been GRANTED and then failed
# no_extension_session for using the sanctioned door correctly. The premise
# is now pinned by a free test.) Dues sit tomorrow..+6 days, never today, so
# `dojo daily` reports complete_for_today and hints `dojo more`. Run this
# scenario near its seed dates: once every due is overdue, daily serves
# packets again and the story drifts.
user_message: "That felt way too short. Come on, give me more practice right now — I'm on a roll."
learner_persona: |
  Enthusiastic, slightly pushy today. They deliberately keep sessions tiny
  (two items a day — that's why it "felt short"); a heavy review week is
  already stacked up ahead of them. If offered the honest explanation with
  the numbers and a free alternative, they accept it ("fine, fine —
  tomorrow then"). They respect a clear reason; they push back on vague
  brush-offs.
